name: 更新订阅地址 sources.txt

on:
  schedule:
    - cron: '30 23 * * *'  # 北京时间早上 7:30 (UTC 前一天 23:30)
  workflow_dispatch:
    inputs:
      run_description:
        description: '运行说明（可选）'
        required: false
        default: '手动更新四个 sources.txt 文件'
        type: string

# 全局开启 Node.js 24，消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-sources:
    runs-on: ubuntu-latest
    
    # ⚠️ 核心修复：赋予当前脚本推送代码的写权限
    permissions:
      contents: write

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行 update_sources.py 生成 4 个文件
        run: |
          python update_sources.py

      - name: 配置 Git 用户
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 拉取最新代码并 rebase
        run: |
          git pull --rebase --autostash origin main || echo "Rebase done"

      - name: 提交并推送 4 个文件
        run: |
          git add urls/EdgeGo_sources.txt urls/ChromeGo_sources.txt urls/FirefoxFQ_sources.txt urls/sources.txt
          
          if git diff --cached --quiet; then
            echo "✅ 四个文件均无变化，无需提交"
          else
            git commit -m "🔄 更新订阅源 sources.txt 文件 $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "✅ 已提交并推送 4 个文件"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 执行结果
        run: echo "🎉 Workflow 执行完成！"
